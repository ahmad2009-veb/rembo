<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<div class="w-full relative flex flex-col bg-white">
  
  <div class="w-full flex sm:flex-row flex-col-reverse">
    
    <div class="w-full sm:w-[600px] bg-[#f4f9f8] sm:h-[680px] sm:pt-[0px] pt-[40px] pb-[140px] sm:pl-[60px] pl-[20px] sm:pr-[40px] pr-[20px] flex flex-col justify-center shrink-0">
      <h1 class="text-[#0f172a] sm:text-[64px] text-[36px] font-bold sm:leading-[74px] leading-[44px] tracking-[-1px]">
        Find your perfect place to stay
      </h1>
      <p class="text-[#64748b] sm:text-[18px] text-[15px] sm:leading-[28px] leading-[24px] sm:mt-[24px] mt-[16px] max-w-[480px]">
        Lorem Ipsum is simply dummy text of the printing and typesetting industry.
      </p>
      
      <div class="flex items-center gap-[16px] sm:mt-[40px] mt-[24px] cursor-pointer group">
        <div class="w-[48px] h-[48px] bg-white rounded-full flex items-center justify-center shadow-[0_4px_12px_rgba(16,185,129,0.15)] transition group-hover:scale-105">
          <img src="./Group 2.png" alt="Play" class="w-[14px] h-[14px] ml-[2px]" />
        </div>
        <span class="text-[#0f172a] text-[16px] font-semibold transition group-hover:text-[#10b981]">Watch video</span>
      </div>
    </div>

    <div class="w-full sm:w-[600px] sm:h-[680px] h-[320px] shrink-0">
      <img src="./9949b2b92ef4c63cc808930493872586a74af1c5.jpg" alt="House" class="w-full h-full object-cover block" />
    </div>

  </div>

  <div class="absolute sm:bottom-[45px] sm:left-[60px] bottom-[-60px] left-[20px] right-[20px] z-20 sm:w-[880px] w-[calc(100%-40px)] bg-white rounded-[32px] sm:p-[10px] p-[20px] sm:pl-[32px] pl-[20px] shadow-[0_16px_40px_rgba(0,0,0,0.08)] flex sm:flex-row flex-col sm:items-center items-start justify-between sm:gap-0 gap-[20px] max-sm:translate-y-[-100px]">
    
    <div class="flex items-center gap-[14px] w-full sm:w-auto">
      <img src="./pin 1.png" alt="Loc" class="w-[20px] h-[20px] shrink-0" />
      <div class="flex flex-col">
        <span class="text-[#1e293b] text-[15px] font-semibold leading-[20px]">Location</span>
        <span class="text-[#94a3b8] text-[13px] mt-[2px]">United States</span>
      </div>
    </div>

    <div class="w-[1px] h-[40px] bg-[#e2e8f0] hidden sm:block"></div>

    <div class="flex items-center gap-[14px] w-full sm:w-auto">
      <img src="./calendar 1.png" alt="Cal" class="w-[20px] h-[20px] shrink-0" />
      <div class="flex flex-col">
        <span class="text-[#1e293b] text-[15px] font-semibold leading-[20px]">Chack in</span>
        <span class="text-[#94a3b8] text-[13px] mt-[2px]">10 Jun 2021</span>
      </div>
    </div>

    <div class="w-[1px] h-[40px] bg-[#e2e8f0] hidden sm:block"></div>

    <div class="flex items-center gap-[14px] w-full sm:w-auto">
      <img src="./calendar 2.png" alt="Cal" class="w-[20px] h-[20px] shrink-0" />
      <div class="flex flex-col">
        <span class="text-[#1e293b] text-[15px] font-semibold leading-[20px]">Chack out</span>
        <span class="text-[#94a3b8] text-[13px] mt-[2px]">15 Jun 2021</span>
      </div>
    </div>

    <div class="w-[1px] h-[40px] bg-[#e2e8f0] hidden sm:block"></div>

    <div class="flex items-center gap-[14px] sm:pr-[20px] pr-0 w-full sm:w-auto">
      <img src="./person 1.png" alt="User" class="w-[20px] h-[20px] shrink-0" />
      <div class="flex flex-col">
        <span class="text-[#1e293b] text-[15px] font-semibold leading-[20px]">Rooms for</span>
        <span class="text-[#94a3b8] text-[13px] mt-[2px]">1 room, 2 guests</span>
      </div>
    </div>

    <button class="bg-[#10b981] text-white h-[64px] sm:px-[40px] px-[20px] rounded-[24px] text-[16px] font-medium flex items-center justify-center gap-[12px] border-none cursor-pointer transition hover:bg-[#0dd393] w-full sm:w-auto h-[54px] sm:rounded-[24px] rounded-[16px]">
      <img src="./search-outline 1.png" alt="Search" class="w-[16px] h-[16px] invert" />
      Search...
    </button>

  </div>

</div>
</body>
</html>
